<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Unbounded:wght@300;400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f3ec; --ink: #2e1a1a; --cream: #ede8dc; --cream2: #e2dccf;
  --gold: #f04400; --gold-light: #ff9070; --muted: #7a7060; --radius: 16px;
  --c1: #f04400; --c2: #8b5e4a; --c3: #4a7c6f; --c4: #7a4a8c;
  --lavender: #a78bca; --pink-star: #e8a0bf;
}
html, body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0.5;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  background-size: 128px;
}
.page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; position: relative; }
header { text-align: center; margin-bottom: 16px; width: 100%; max-width: 500px; }
.series-tag { display: inline-block; font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--cream2); border-radius: 99px; padding: 5px 16px; margin-bottom: 20px; }
h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.6rem, 9vw, 4rem); font-weight: 700; line-height: 0.95; letter-spacing: -0.02em; margin-bottom: 18px; color: var(--ink); }
h1 span { display: block; color: var(--lavender); font-style: italic; font-weight: 700; font-size: clamp(3rem, 10vw, 4.6rem); }
.tagline { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 320px; margin: 0 auto; }
.cards-area { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.keyword-card { background: white; border-radius: var(--radius); border: 1px solid var(--cream2); padding: 18px 20px; display: flex; align-items: center; gap: 16px; position: relative; overflow: hidden; }
.keyword-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.card-color::before   { background: var(--c1); }
.card-texture::before { background: var(--c2); }
.card-motif::before   { background: var(--c3); }
.card-effet::before   { background: var(--c4); }
.card-illus { width: 52px; height: 52px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: var(--bg); }
.card-illus svg { width: 36px; height: 36px; display: block; }
.card-meta { flex: 1; min-width: 0; }
.card-category { font-family: 'Unbounded', sans-serif; font-size: 7.5px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.card-value { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 10px; }
.card-value.rolling { animation: rollText 0.4s ease; }
@keyframes rollText { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.reroll-btn {
  display: none;
  background: none;
  border: 1px solid var(--cream2);
  border-radius: 8px;
  padding: 5px 7px;
  cursor: pointer;
  color: var(--muted);
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  line-height: 1;
}
.reroll-btn:hover { background: var(--cream); border-color: var(--cream2); transform: rotate(15deg) scale(1.1); }
.reroll-btn:active { transform: scale(0.9); }
.reroll-btn.visible { display: inline-flex; align-items: center; justify-content: center; }
.reroll-btn svg { width: 16px; height: 16px; display: block; }
.btn-wrap { width: 100%; max-width: 500px; }
.loading-bar { height: 2px; background: var(--gold); border-radius: 99px; width: 0%; transition: width 1.3s ease; margin-bottom: 12px; opacity: 0; }
.loading-bar.active { opacity: 1; width: 90%; }
.btn-roll { width: 100%; padding: 17px; background: var(--ink); color: var(--bg); font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; }
.btn-roll:hover { background: #2e2410; box-shadow: 0 8px 28px rgba(26,18,8,0.2); transform: translateY(-2px); }
.btn-roll:active { transform: scale(0.98); box-shadow: none; }
.btn-roll:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
.dice-icon { font-size: 17px; transition: transform 0.3s; }
.btn-roll:hover .dice-icon { transform: rotate(20deg) scale(1.1); }
.result-section { width: 100%; max-width: 500px; margin-top: 24px; opacity: 0; transform: translateY(14px); transition: opacity 0.4s, transform 0.4s; pointer-events: none; }
.result-section.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.result-card { background: var(--ink); color: var(--bg); border-radius: var(--radius); padding: 24px 22px; position: relative; overflow: hidden; }
.result-card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(201,168,76,0.13) 0%, transparent 70%); pointer-events: none; }
.result-label { font-family: 'Unbounded', sans-serif; font-size: 8px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.result-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.2); }
.result-text { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 400; line-height: 1.8; color: rgba(245,240,232,0.9); }
.result-text strong { color: var(--gold-light); font-style: italic; }
.result-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-action { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: rgba(245,240,232,0.75); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-action:hover { background: rgba(255,255,255,0.1); color: var(--bg); }
.history-section { width: 100%; max-width: 500px; margin-top: 32px; }
.section-title { font-family: 'Unbounded', sans-serif; font-size: 8.5px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--cream2); }
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item { display: flex; flex-wrap: wrap; gap: 6px; background: var(--cream); border-radius: 10px; padding: 10px 14px; border: 1px solid transparent; animation: slideIn 0.3s ease both; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
.h-pill { display: inline-flex; align-items: center; gap: 4px; background: white; border: 1px solid var(--cream2); border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 500; color: var(--ink); white-space: nowrap; }
.h-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.customize-toggle { width: 100%; max-width: 500px; margin-top: 28px; }
.btn-customize { width: 100%; padding: 13px; background: transparent; border: 1px solid var(--cream2); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, color 0.15s; }
.btn-customize:hover { background: var(--cream); color: var(--ink); }
.chevron { display: inline-block; transition: transform 0.3s; font-style: normal; }
.chevron.open { transform: rotate(180deg); }
.customize-panel { width: 100%; max-width: 500px; margin-top: 12px; background: white; border: 1px solid var(--cream2); border-radius: var(--radius); overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
.customize-panel.open { max-height: 2000px; padding-bottom: 20px; }
.panel-tabs { display: flex; border-bottom: 1px solid var(--cream2); }
.tab-btn { flex: 1; padding: 12px 6px; font-family: 'Unbounded', sans-serif; font-size: 7px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: transparent; border: none; cursor: pointer; transition: color 0.15s, background 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); background: var(--bg); }
.tab-btn:hover:not(.active) { background: var(--cream); }
.tab-content { display: none; padding: 20px 20px 0; }
.tab-content.active { display: block; }
.words-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; min-height: 40px; }
.word-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--cream); border: 1px solid var(--cream2); border-radius: 99px; padding: 5px 10px 5px 12px; font-size: 12.5px; color: var(--ink); }
.word-chip .del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; padding: 0 2px; transition: color 0.15s; }
.word-chip .del:hover { color: #c23b2a; }
.add-row { display: flex; gap: 8px; }
.add-input { flex: 1; padding: 9px 12px; border: 1px solid var(--cream2); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--bg); color: var(--ink); outline: none; }
.add-input:focus { border-color: #aaa; }
.add-input::placeholder { color: var(--muted); }
.btn-add { padding: 9px 16px; background: var(--ink); color: var(--bg); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
.btn-add:hover { background: #2e2410; }
.hex-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.hex-input { padding: 9px 12px; border: 1px solid var(--cream2); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--bg); color: var(--ink); outline: none; width: 100px; }
.hex-input:focus { border-color: #aaa; }
.color-preview { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--cream2); flex-shrink: 0; }
.chip-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
@keyframes sparkle-pop {
  0%   { opacity:0; transform: scale(0) rotate(0deg); }
  40%  { opacity:1; transform: scale(1.2) rotate(20deg); }
  70%  { opacity:0.8; transform: scale(1) rotate(-10deg); }
  100% { opacity:0; transform: scale(0.4) rotate(30deg) translateY(-12px); }
}
.deco-num { position: absolute; font-family: 'Playfair Display', serif; font-size: 8rem; font-weight: 700; color: var(--cream2); line-height: 1; pointer-events: none; user-select: none; z-index: -1; }
.deco-left { left: -10px; top: 130px; }
.deco-right { right: -10px; bottom: 220px; opacity: 0.5; }
.counter-wrap { width: 100%; max-width: 500px; margin-top: 22px; text-align: center; }
.counter-label { font-family: 'Unbounded', sans-serif; font-size: 8px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.counter-value { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

</head>

let last = { couleur: null, texture: null, motif: null, effet: null };
const history = [];

function pick(arr, last) {
  let item;
  do { item = arr[Math.floor(Math.random() * arr.length)]; }
  while (item === last && arr.length > 1);
  return item;
}

function animVal(id, val) {
  const el = document.getElementById(id);
  el.classList.remove('rolling'); void el.offsetWidth;
  el.textContent = val;
  el.classList.add('rolling');
}

async function roll() {
  const btn = document.getElementById('roll-btn');
  btn.disabled = true;
  document.getElementById('btn-text').textContent = 'Tirage…';
  const bar = document.getElementById('loading-bar');
  bar.classList.remove('active'); void bar.offsetWidth; bar.classList.add('active');

  let ticks = 0;
  const totalTicks = 22;
  await new Promise(resolve => {
    const runTicker = () => {
      const rc = DATA.couleur[Math.floor(Math.random()*DATA.couleur.length)];
      document.getElementById('val-color-text').textContent = rc.name;
      document.getElementById('swatch-circle').setAttribute('fill', rc.hex);
      const rt = DATA.texture[Math.floor(Math.random()*DATA.texture.length)];
      const rm = DATA.motif[Math.floor(Math.random()*DATA.motif.length)];
      const re = DATA.effet[Math.floor(Math.random()*DATA.effet.length)];
      document.getElementById('val-texture').textContent = rt;
      document.getElementById('val-motif').textContent   = rm;
      document.getElementById('val-effet').textContent   = re;
      setIllus('texture', rt);
      setIllus('motif',   rm);
      setIllus('effet',   re);
      playTick();
      ticks++;
      if (ticks < totalTicks) {
        const progress = ticks / totalTicks;
        const delay = 50 + Math.pow(progress, 2.2) * 200;
        setTimeout(runTicker, delay);
      } else {
        resolve();
      }
    };
    runTicker();
  });

  const color   = pick(DATA.couleur, last.couleur);
  const texture = pick(DATA.texture, last.texture);
  const motif   = pick(DATA.motif,   last.motif);
  const effet   = pick(DATA.effet,   last.effet);
  last = { couleur: color, texture, motif, effet };

  document.getElementById('val-color-text').textContent = color.name;
  const vcEl = document.getElementById('val-color');
  vcEl.classList.remove('rolling'); void vcEl.offsetWidth; vcEl.classList.add('rolling');
  
  document.getElementById('swatch-circle').setAttribute('fill', color.hex);

  // show reroll buttons after first roll
  document.querySelectorAll('.reroll-btn').forEach(b => b.classList.add('visible'));

  animVal('val-texture', texture);
  animVal('val-motif', motif);
  animVal('val-effet', effet);

  setIllus('texture', texture);
  setIllus('motif', motif);
  setIllus('effet', effet);

  playWin();
  spawnSparkles();

  addToHistory(color, texture, motif, effet);
  incrementTirages();

  bar.classList.remove('active');
  btn.disabled = false;
  document.getElementById('btn-text').textContent = 'Lancer le tirage';
}

function addToHistory(color, texture, motif, effet) {
  history.unshift({ color, texture, motif, effet });
  if (history.length > 5) history.pop();
  const sec  = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (history.length > 1) {
    sec.style.display = 'block';
    list.innerHTML = '';
    history.slice(1).forEach((h, i) => {
      const el = document.createElement('div');
      el.className = 'history-item';
      el.style.animationDelay = (i * 0.05) + 's';
      el.innerHTML = `<span class="h-pill"><span class="h-dot" style="background:${h.color.hex}"></span>${h.color.name}</span><span class="h-pill">🧵 ${h.texture}</span><span class="h-pill">✦ ${h.motif}</span><span class="h-pill">⚡ ${h.effet}</span>`;
      list.appendChild(el);
    });
  }
}

async function rerollOne(cat) {
  const btn = document.getElementById('reroll-' + (cat === 'couleur' ? 'color' : cat));
  if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }

  let ticks = 0;
  const total = 16;

  await new Promise(resolve => {
    const runTicker = () => {
      if (cat === 'couleur') {
        const rc = DATA.couleur[Math.floor(Math.random()*DATA.couleur.length)];
        document.getElementById('val-color-text').textContent = rc.name;
        document.getElementById('swatch-circle').setAttribute('fill', rc.hex);
      } else {
        const arr = DATA[cat];
        const rval = arr[Math.floor(Math.random()*arr.length)];
        document.getElementById('val-' + cat).textContent = rval;
        setIllus(cat, rval);
      }
      playTickHigh();
      ticks++;
      if (ticks < total) {
        const progress = ticks / total;
        const delay = 50 + Math.pow(progress, 2.2) * 200;
        setTimeout(runTicker, delay);
      } else {
        resolve();
      }
    };
    runTicker();
  });

  // final pick
  if (cat === 'couleur') {
    const color = pick(DATA.couleur, last.couleur);
    last.couleur = color;
    document.getElementById('val-color-text').textContent = color.name;
    const el = document.getElementById('val-color');
    el.classList.remove('rolling'); void el.offsetWidth; el.classList.add('rolling');
    document.getElementById('swatch-circle').setAttribute('fill', color.hex);
  } else {
    const val = pick(DATA[cat], last[cat]);
    last[cat] = val;
    animVal('val-' + cat, val);
    setIllus(cat, val);
  }

  playMiniWin();
  const cardId = cat === 'couleur' ? 'card-color' : 'reroll-' + cat;
  const targetCard = btn ? btn.closest('.keyword-card') : null;
  if (targetCard) spawnSparklesOnCard(targetCard);
  if (btn) { btn.disabled = false; btn.style.opacity = ''; }
}

function createAudioContext() {
  if (!window._audioCtx) window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return window._audioCtx;
}

function playTick() {
  try {
    const ctx = createAudioContext();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ctx.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 80) * 0.3
               + Math.sin(2 * Math.PI * 900 * t) * Math.exp(-t * 120) * 0.15;
    }
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1000;
    filter.Q.value = 1.2;
    src.buffer = buf;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    src.start();
  } catch(e) {}
}

function playTickHigh() {
  try {
    const ctx = createAudioContext();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ctx.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 100) * 0.2
               + Math.sin(2 * Math.PI * 1800 * t) * Math.exp(-t * 150) * 0.12;
    }
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 1.5;
    src.buffer = buf;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    src.start();
  } catch(e) {}
}

function playMiniWin() {
  try {
    const ctx = createAudioContext();
    const notes = [1567, 2093];
    notes.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.07;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.05, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.start(t); osc.stop(t + 0.16);
    });
  } catch(e) {}
}

function spawnSparklesOnCard(card) {
  for (let i = 0; i < 7; i++) {
    const star = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    star.setAttribute('viewBox', '0 0 20 20');
    star.style.cssText = `
      position:absolute; width:${8 + Math.random()*12}px; height:${8 + Math.random()*12}px;
      left:${Math.random()*90}%; top:${Math.random()*80}%;
      pointer-events:none; z-index:10;
      animation: sparkle-pop 0.65s ease forwards;
      animation-delay:${i * 0.06}s;
      opacity:0;
    `;
    const colors = ['#e8a0bf','#a78bca','#f0c0d4','#f04400','#ffd700'];
    const color = colors[Math.floor(Math.random()*colors.length)];
    star.innerHTML = `<path d="M10 1 L11.5 8 L18 10 L11.5 12 L10 19 L8.5 12 L2 10 L8.5 8 Z" fill="${color}"/>`;
    card.style.overflow = 'visible';
    card.appendChild(star);
    setTimeout(() => star.remove(), 1000 + i * 60);
  }
}

function playWin() {
  try {
    const ctx = createAudioContext();
    const sparkNotes = [1046, 1318, 1567, 1760, 2093, 1318, 1760, 1046, 2093, 1567];
    sparkNotes.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.055 + Math.random() * 0.02;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.linearRampToValueAtTime(freq * 1.04, t + 0.08);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.06, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.start(t); osc.stop(t + 0.2);
    });
  } catch(e) {}
}

function spawnSparkles() {
  const cards = document.querySelectorAll('.keyword-card');
  cards.forEach((card, ci) => {
    for (let i = 0; i < 6; i++) {
      const star = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      star.setAttribute('viewBox', '0 0 20 20');
      star.style.cssText = `
        position:absolute; width:${10 + Math.random()*14}px; height:${10 + Math.random()*14}px;
        left:${Math.random()*90}%; top:${Math.random()*80}%;
        pointer-events:none; z-index:10;
        animation: sparkle-pop 0.7s ease forwards;
        animation-delay:${ci * 0.06 + i * 0.07}s;
        opacity:0;
      `;
      const colors = ['#e8a0bf','#a78bca','#f0c0d4','#f04400','#ffd700'];
      const color = colors[Math.floor(Math.random()*colors.length)];
      star.innerHTML = `<path d="M10 1 L11.5 8 L18 10 L11.5 12 L10 19 L8.5 12 L2 10 L8.5 8 Z" fill="${color}"/>`;
      card.style.position = 'relative';
      card.style.overflow = 'visible';
      card.appendChild(star);
      setTimeout(() => star.remove(), 1200 + ci * 60 + i * 70);
    }
  });
}

function copyResult() {
  const text = document.getElementById('result-text').innerText;
  const kw = `${last.couleur?.name} · ${last.texture} · ${last.motif} · ${last.effet}\n\n${text}`;
  navigator.clipboard.writeText(kw).catch(() => {});
  document.getElementById('copy-label').textContent = 'Copié !';
  document.getElementById('copy-icon').textContent  = '✓';
  setTimeout(() => { document.getElementById('copy-label').textContent = 'Copier'; document.getElementById('copy-icon').textContent = '📋'; }, 1800);
}

let panelOpen = false;
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('customize-panel').classList.toggle('open', panelOpen);
  document.getElementById('chevron').classList.toggle('open', panelOpen);
  if (panelOpen) renderAllChips();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['couleur','texture','motif','effet'][i] === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderChips(tab);
}

function renderAllChips() { ['couleur','texture','motif','effet'].forEach(renderChips); }

function renderChips(cat) {
  const container = document.getElementById('chips-' + cat);
  container.innerHTML = '';
  DATA[cat].forEach((item, i) => {
    const name = cat === 'couleur' ? item.name : item;
    const hex  = cat === 'couleur' ? item.hex  : null;
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.innerHTML = (hex ? `<span class="chip-dot" style="background:${hex}"></span>` : '') + escHtml(name) + `<button class="del" onclick="removeWord('${cat}',${i})">×</button>`;
    container.appendChild(chip);
  });
}

function removeWord(cat, idx) { DATA[cat].splice(idx, 1); renderChips(cat); }

function addWord(cat) {
  if (cat === 'couleur') {
    const name = document.getElementById('add-couleur-name').value.trim();
    const hex  = document.getElementById('add-couleur-hex').value.trim() || '#888888';
    if (!name) return;
    DATA.couleur.push({ name, hex });
    document.getElementById('add-couleur-name').value = '';
    document.getElementById('add-couleur-hex').value  = '';
    document.getElementById('hex-preview').style.background = '';
  } else {
    const input = document.getElementById('add-' + cat);
    const val = input.value.trim();
    if (!val) return;
    DATA[cat].push(val);
    input.value = '';
  }
  renderChips(cat);
}

function previewHex(input) {
  const val = input.value.trim();
  if (/^#[0-9a-fA-F]{3,6}$/.test(val)) document.getElementById('hex-preview').style.background = val;
}

['add-texture','add-motif','add-effet'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(id.replace('add-','')); });
});
document.getElementById('add-couleur-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') addWord('couleur'); });

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
